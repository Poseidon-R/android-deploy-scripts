  try {
    const infoResp = await fetch(INFO_PATH);
    if (!infoResp.ok) throw new Error(`app-release.json 加载失败 (HTTP ${infoResp.status})`);
    const info = await infoResp.json();
    appName.textContent = info.appName || 'App';
